# All services pinned to linux/arm64. Bun's amd64 build is dramatically
# more memory-hungry on Proxmox/KVM CPUs that don't expose AVX (an idle
# Bun process on the demo VPS uses ~440 MiB on amd64 vs ~9 MiB on arm64
# native Mac, and ~80 MiB on the same VPS via QEMU emulation). Forcing
# arm64 lets the demo fit in <1 GiB total — slower per-request under
# emulation, but irrelevant for this workload. Apple-Silicon Macs also
# run these natively without emulation, which is a happy bonus.
services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    platform: linux/arm64
    container_name: jaeger
    hostname: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # Serve the UI under /jaeger/ so a single reverse-proxy hostname can
      # multiplex Editor (/) and Jaeger (/jaeger/). The QUERY_BASE_PATH env
      # is the supported way to reroot Jaeger's static asset and API URLs.
      QUERY_BASE_PATH: /jaeger
    ports:
      - "16686:16686"
    networks:
      - mesh
    restart: unless-stopped

  editor:
    build:
      context: ..
      dockerfile: example/agents/editor/Dockerfile
      platforms: ["linux/arm64"]
    platform: linux/arm64
    image: axl-otel-editor
    container_name: editor
    hostname: editor
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OTLP_URL: http://jaeger:4318
      OTEL_SERVICE_NAME: editor
      SIDECAR_RECEIVE: "1"
      # Sidecar's --receive mode pulls inbound spans off /recv. With this URL
      # set, it ALSO POSTs each decoded payload here so the editor app can
      # forward the spans onto its SSE bus and drive the live mesh visual
      # for downstream peers (web-search, citation-db).
      INBOUND_CALLBACK_URL: http://127.0.0.1:8080/internal/inbound-spans
      # Set to "1" (or anything non-empty) to skip starting the sidecar in
      # every container. Used by the demo's "broken" recording to show what
      # debugging on AXL looks like with no observability transport.
      SIDECAR_DISABLED: ${SIDECAR_DISABLED:-}
      # Public Jaeger URL exposed by the reverse proxy. The Editor serves
      # the frontend at the apex and Jaeger under /jaeger/ on the same host.
      JAEGER_UI_URL: ${JAEGER_UI_URL:-/jaeger/}
      # Internal Jaeger query API the editor polls after each run to know
      # when the trace is queryable. Lives on the docker network, separate
      # from the browser-facing JAEGER_UI_URL above.
      JAEGER_QUERY_URL: ${JAEGER_QUERY_URL:-http://jaeger:16686}
      # Public-demo abuse limits. Both default to safe values; override via
      # env on the VPS if you want to raise/lower the cap.
      RATE_LIMIT_PER_IP_HOUR: ${RATE_LIMIT_PER_IP_HOUR:-3}
      RATE_LIMIT_GLOBAL_DAY: ${RATE_LIMIT_GLOBAL_DAY:-50}
    ports:
      - "8080:8080"
    volumes:
      - ./keys/editor.pem:/etc/axl/private.pem:ro
      - ./configs/editor/node-config.json:/etc/axl/node-config.json:ro
      - ./configs/peers-editor:/etc/axl/peers:ro
    networks:
      - mesh
    depends_on:
      - jaeger
    restart: unless-stopped

  researcher:
    build:
      context: ..
      dockerfile: example/agents/researcher/Dockerfile
      platforms: ["linux/arm64"]
    platform: linux/arm64
    image: axl-otel-researcher
    container_name: researcher
    hostname: researcher
    environment:
      OTEL_SERVICE_NAME: researcher
      # Non-originators must never talk to the originator's Jaeger directly:
      # all spans that don't belong to this peer should leave via AXL /send.
      # Pointing local-forward at an unreachable port enforces that — if a
      # span ever fell into the "forward locally" branch, you'd see an
      # ECONNREFUSED in the logs instead of silent direct delivery.
      OTLP_URL: http://127.0.0.1:65535
      SIDECAR_DISABLED: ${SIDECAR_DISABLED:-}
    volumes:
      - ./keys/researcher.pem:/etc/axl/private.pem:ro
      - ./configs/researcher/node-config.json:/etc/axl/node-config.json:ro
      - ./configs/peers-researcher:/etc/axl/peers:ro
    networks:
      - mesh
    depends_on:
      - editor
    restart: unless-stopped

  web-search:
    build:
      context: ..
      dockerfile: example/agents/web-search/Dockerfile
      platforms: ["linux/arm64"]
    platform: linux/arm64
    image: axl-otel-web-search
    container_name: web-search
    hostname: web-search
    environment:
      OTEL_SERVICE_NAME: web-search
      OTLP_URL: http://127.0.0.1:65535
      SIDECAR_DISABLED: ${SIDECAR_DISABLED:-}
    volumes:
      - ./keys/web-search.pem:/etc/axl/private.pem:ro
      - ./configs/web-search/node-config.json:/etc/axl/node-config.json:ro
      - ./configs/peers-web-search:/etc/axl/peers:ro
    networks:
      - mesh
    depends_on:
      - researcher
    restart: unless-stopped

  fact-checker:
    build:
      context: ..
      dockerfile: example/agents/fact-checker/Dockerfile
      platforms: ["linux/arm64"]
    platform: linux/arm64
    image: axl-otel-fact-checker
    container_name: fact-checker
    hostname: fact-checker
    environment:
      OTEL_SERVICE_NAME: fact-checker
      OTLP_URL: http://127.0.0.1:65535
      SIDECAR_DISABLED: ${SIDECAR_DISABLED:-}
    volumes:
      - ./keys/fact-checker.pem:/etc/axl/private.pem:ro
      - ./configs/fact-checker/node-config.json:/etc/axl/node-config.json:ro
      - ./configs/peers-fact-checker:/etc/axl/peers:ro
    networks:
      - mesh
    depends_on:
      - editor
    restart: unless-stopped

  citation-db:
    build:
      context: ..
      dockerfile: example/agents/citation-db/Dockerfile
      platforms: ["linux/arm64"]
    platform: linux/arm64
    image: axl-otel-citation-db
    container_name: citation-db
    hostname: citation-db
    environment:
      OTEL_SERVICE_NAME: citation-db
      OTLP_URL: http://127.0.0.1:65535
      SIDECAR_DISABLED: ${SIDECAR_DISABLED:-}
    volumes:
      - ./keys/citation-db.pem:/etc/axl/private.pem:ro
      - ./configs/citation-db/node-config.json:/etc/axl/node-config.json:ro
      - ./configs/peers-citation-db:/etc/axl/peers:ro
    networks:
      - mesh
    depends_on:
      - fact-checker
    restart: unless-stopped

networks:
  mesh:
    driver: bridge
